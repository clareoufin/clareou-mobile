<style>
  /* ── Tokens ── */
  :root {
    --navy:   #0e2820;
    --green:  #0d654f;
    --green-l:#e5f2ed;
    --gold:   #c9a448;
    --gold-l: #f9f0d8;
    --red:    #c0443a;
    --red-l:  #fce9e7;
    --amber:  #a3760f;
    --amber-l:#fdf0d0;
    --blue:   #2a5f7a;
    --blue-l: #e4eff5;
    --bg:     #f0f4f2;
    --surface:#ffffff;
    --ink:    #0f1f1a;
    --sub:    #587068;
    --line:   #d8e3de;
    --r-card: 18px;
    --r-btn:  14px;
    --r-pill: 999px;
    --shadow: 0 2px 12px rgba(14,40,32,.08);
    --shadow-md: 0 6px 24px rgba(14,40,32,.12);
    -webkit-text-size-adjust:100%;
    text-size-adjust:100%;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    font-size: 16px;
    line-height: 1.45;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  body { padding-bottom: 82px; }
  button, input, select, textarea { font: inherit; outline: none; }

  /* ── Screens ── */
  .screen { display: none; padding: 0 0 24px; max-width: 480px; margin: 0 auto; }
  .screen.active { display: block; animation: fadein .18s ease-out; }
  @keyframes fadein { from { opacity:.3; transform:translateY(6px); } to { opacity:1; transform:none; } }

  /* ── Top bar ── */
  .topbar {
    position: sticky; top: 0; z-index: 10;
    background: var(--navy);
    padding: 14px 20px;
    display: flex; align-items: center; gap: 12px;
  }
  .topbar .logo {
    width: 32px; height: 32px; border-radius: 50%;
    background: #f4dc8e; color: var(--navy);
    display: grid; place-items: center;
    font-weight: 800; font-size: 16px; flex-shrink: 0;
  }
  .topbar strong { font-size: 17px; font-weight: 700; color: #f0faf5; letter-spacing: -.3px; }
  .topbar span { margin-left: auto; font-size: 12px; color: #8dbdaa; font-weight: 500; }

  /* ── Hero card ── */
  .hero-card {
    background: linear-gradient(145deg, #112e24 0%, #0d654f 100%);
    border-radius: 0 0 28px 28px;
    padding: 28px 24px 32px;
    position: relative; overflow: hidden;
  }
  .hero-card::before {
    content: '';
    position: absolute; top: 0; left: 24px; right: 24px; height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .hero-card .h-eyebrow {
    font-size: 11px; font-weight: 600; letter-spacing: .8px;
    text-transform: uppercase; color: #7dbaaa; margin-bottom: 10px;
  }
  .hero-card .h-value {
    font-size: 42px; font-weight: 800; color: #ffffff;
    letter-spacing: -1.5px; line-height: 1;
  }
  .hero-card .h-label {
    font-size: 13px; color: #8dbdaa; margin-top: 6px; font-weight: 500;
  }
  .hero-card .h-chips {
    display: flex; gap: 10px; margin-top: 22px; flex-wrap: wrap;
  }
  .h-chip {
    background: rgba(255,255,255,.1); border-radius: 10px;
    padding: 8px 14px; flex: 1; min-width: 0;
  }
  .h-chip span { display: block; font-size: 10px; color: #8dbdaa; font-weight: 600; letter-spacing:.3px; margin-bottom:3px; }
  .h-chip strong { display: block; font-size: 15px; color: #fff; font-weight: 700; }

  /* ── Content padding ── */
  .content { padding: 20px 16px 0; display: flex; flex-direction: column; gap: 14px; }

  /* ── Cards ── */
  .card {
    background: var(--surface);
    border-radius: var(--r-card);
    padding: 18px 20px;
    box-shadow: var(--shadow);
  }
  .card-head {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 14px;
  }
  .card-head h3 { font-size: 15px; font-weight: 700; color: var(--ink); }

  /* ── KPI grid ── */
  .kpi-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .kpi-card {
    background: var(--surface); border-radius: var(--r-card);
    padding: 16px 18px; box-shadow: var(--shadow);
    border-top: 3px solid var(--line);
  }
  .kpi-card.ok   { border-color: var(--green); }
  .kpi-card.warn { border-color: var(--amber); }
  .kpi-card.bad  { border-color: var(--red); }
  .kpi-card.info { border-color: var(--blue); }
  .kpi-card span { display:block; font-size:11px; font-weight:600; letter-spacing:.3px; text-transform:uppercase; color:var(--sub); margin-bottom:6px; }
  .kpi-card strong { display:block; font-size:22px; font-weight:800; letter-spacing:-0.5px; color:var(--ink); }

  /* ── Pills ── */
  .pill {
    display: inline-flex; align-items: center;
    padding: 3px 10px; border-radius: var(--r-pill);
    font-size: 11px; font-weight: 700; letter-spacing: .2px;
  }
  .pill.ok   { background: var(--green-l); color: var(--green); }
  .pill.warn { background: var(--amber-l); color: var(--amber); }
  .pill.bad  { background: var(--red-l);   color: var(--red);   }
  .pill.info { background: var(--blue-l);  color: var(--blue);  }

  /* ── Insight card ── */
  .insight {
    border-left: 4px solid var(--line);
    padding: 12px 14px; border-radius: 0 10px 10px 0;
    background: #fafcfb;
  }
  .insight.ok   { border-color: var(--green); }
  .insight.warn { border-color: var(--amber); }
  .insight.bad  { border-color: var(--red);   }
  .insight.info { border-color: var(--blue);  }
  .insight .i-head { display:flex; justify-content:space-between; gap:8px; align-items:flex-start; margin-bottom:5px; }
  .insight .i-title { font-size:14px; font-weight:700; color:var(--ink); }
  .insight .i-text { font-size:13px; color:var(--sub); line-height:1.5; }
  .insight .i-detail { font-size:12px; font-weight:700; color:var(--ink); margin-top:6px; }

  /* ── Buttons ── */
  .btn {
    display:block; width:100%; min-height:52px;
    border-radius:var(--r-btn); border:1.5px solid var(--line);
    background:var(--surface); color:var(--ink);
    font-size:15px; font-weight:700; cursor:pointer;
    transition:opacity .15s; text-align:center;
    padding: 12px 16px;
  }
  .btn:active { opacity:.75; }
  .btn.primary {
    background: var(--green); border-color: var(--green);
    color: #fff;
  }
  .btn.ghost {
    background: transparent; border-color: var(--green);
    color: var(--green);
  }
  .btn-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }

  /* ── Form elements ── */
  .field { display:flex; flex-direction:column; gap:7px; }
  .field label { font-size:12px; font-weight:700; letter-spacing:.3px; text-transform:uppercase; color:var(--sub); }
  .field input, .field select, .field textarea {
    min-height:50px; border:1.5px solid var(--line);
    border-radius:12px; padding:12px 14px;
    font-size:15px; color:var(--ink); background:#fff;
    transition:border-color .15s;
  }
  .field input:focus, .field select:focus, .field textarea:focus { border-color:var(--green); }
  .field textarea { min-height:80px; resize:vertical; }

  /* ── Quick type selector ── */
  .type-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
  .type-row input { position:absolute; opacity:0; }
  .type-row label { display:block; }
  .type-row span {
    display:grid; place-items:center; min-height:48px;
    border:1.5px solid var(--line); border-radius:12px;
    font-size:13px; font-weight:700; color:var(--sub);
    cursor:pointer; background:#fafcfb;
    transition:all .15s;
  }
  .type-row input:checked + span { background:var(--green); border-color:var(--green); color:#fff; }

  /* ── Bottom nav ── */
  .bottom-nav {
    position:fixed; left:0; right:0; bottom:0; z-index:20;
    background:var(--surface);
    border-top:1px solid var(--line);
    display:grid; grid-template-columns:1fr 1fr 1fr;
    padding:6px 8px calc(6px + env(safe-area-inset-bottom));
  }
  .nav-btn {
    background:transparent; border:0;
    display:flex; flex-direction:column; align-items:center; gap:3px;
    padding:8px 4px; border-radius:12px;
    color:var(--sub); font-size:11px; font-weight:600;
    cursor:pointer; transition:all .15s;
  }
  .nav-btn .ic { font-size:22px; line-height:1; transition:transform .15s; }
  .nav-btn.active { color:var(--green); background:var(--green-l); }
  .nav-btn.active .ic { transform:scale(1.1); }

  /* ── Toast ── */
  .toast {
    position:fixed; left:16px; right:16px; bottom:92px; z-index:50;
    background:var(--navy); color:#fff;
    padding:14px 18px; border-radius:14px;
    font-size:14px; font-weight:500;
    box-shadow:var(--shadow-md);
    opacity:0; transform:translateY(10px);
    pointer-events:none; transition:.2s ease;
  }
  .toast.show { opacity:1; transform:translateY(0); }

  /* ── Login screen ── */
  .login-screen {
    min-height:100vh; display:grid; place-items:center;
    padding:24px; background:var(--bg);
  }
  .login-card {
    width:100%; max-width:380px;
    background:var(--surface); border-radius:24px;
    padding:32px 28px;
    box-shadow: 0 20px 60px rgba(14,40,32,.12);
  }
  .login-logo {
    width:52px; height:52px; border-radius:50%;
    background:var(--navy); display:grid; place-items:center;
    margin-bottom:20px;
  }
  .login-logo span {
    font-size:26px; font-weight:800; color:#f4dc8e; line-height:1;
  }
  .login-card h1 { font-size:26px; font-weight:800; letter-spacing:-.5px; margin-bottom:6px; }
  .login-card p { font-size:14px; color:var(--sub); margin-bottom:24px; line-height:1.5; }
  .login-hint { margin-top:16px; font-size:12px; color:var(--sub); line-height:1.5; text-align:center; }

  /* ── Sim result ── */
  .result-banner {
    border-radius:var(--r-card); padding:20px;
    background:var(--green-l); border:1.5px solid var(--green);
  }
  .result-banner.warn { background:var(--amber-l); border-color:var(--amber); }
  .result-banner.bad  { background:var(--red-l);   border-color:var(--red); }
  .result-banner h4 { font-size:15px; font-weight:700; margin-bottom:4px; }
  .result-banner p { font-size:13px; color:var(--sub); }
  .compare-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:12px; }
  .compare-box { background:#fff; border-radius:12px; padding:14px; }
  .compare-box span { display:block; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.3px; color:var(--sub); margin-bottom:5px; }
  .compare-box strong { display:block; font-size:18px; font-weight:800; }
  .money-pos { color:var(--green); }
  .money-neg { color:var(--red); }

  /* ── Install banner ── */
  #installBanner {
    display:none; position:fixed; left:12px; right:12px; bottom:92px; z-index:40;
    background:var(--navy); color:#f0faf5;
    border-radius:16px; padding:16px 18px;
    box-shadow:var(--shadow-md);
  }
  #installBannerText { font-size:13px; line-height:1.5; margin-bottom:8px; }

  /* ── Utilities ── */
  .mt8  { margin-top:8px; }
  .mt12 { margin-top:12px; }
  .mt16 { margin-top:16px; }
  .hint { font-size:12px; color:var(--sub); line-height:1.5; margin-top:10px; }
  .section-label { font-size:11px; font-weight:700; letter-spacing:.5px; text-transform:uppercase; color:var(--sub); margin-bottom:10px; }
  .divider { height:1px; background:var(--line); margin:4px 0; }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation:none !important; transition:none !important; }
  }
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="login-logo"><span>$</span></div>
    <h1>Clareou</h1>
    <p>Entre com o mesmo código e chave do perfil que já usam no computador.</p>
    <div class="field mt8"><label>Código do perfil</label><input id="loginProfileId" placeholder="Ex: JORGE-CASA" autocapitalize="characters"></div>
    <div class="field mt12"><label>Chave/PIN</label><input id="loginProfileKey" type="password" placeholder="Sua chave"></div>
    <button class="btn primary mt16" id="loginBtn">Entrar</button>
    <p class="login-hint">Esqueceu a chave? Peça a quem administra o Clareou de vocês.</p>
  </div>
</div>

<div id="app" style="display:none">
  <div class="topbar">
    <div class="logo">$</div>
    <strong>Clareou</strong>
    <span id="topbarSub"></span>
  </div>

  <section class="screen active" id="screen-resumo"></section>
  <section class="screen" id="screen-rapido"></section>
  <section class="screen" id="screen-simulador"></section>

  <nav class="bottom-nav">
    <button class="nav-btn active" data-screen="resumo"><span class="ic">&#9638;</span>Resumo</button>
    <button class="nav-btn" data-screen="rapido"><span class="ic">&#43;</span>Rápido</button>
    <button class="nav-btn" data-screen="simulador"><span class="ic">&#9671;</span>Simular</button>
  </nav>
</div>

<div class="toast" id="toast"></div>
<div id="installBanner">
  <div id="installBannerText"></div>
  <button class="btn ghost mt8" id="installBannerClose" style="min-height:40px;font-size:13px">Entendi</button>
</div>

<script>
(function(){
  // ============ CONFIGURAÇÃO ============
  // Cole aqui a URL do seu Web App do Apps Script, terminando em /exec
  const CONFIG = {
    API_URL: 'https://script.google.com/macros/s/AKfycbxN-CG2PuFKbdYUYhS9_c89nXi7Ke7QKjBDZY-9vAi3YXSVtDVzEGgkL0RyNPJYS1L0bQ/exec'
  };
  // =======================================

  let session = { profileId: '', profileKey: '' };
  let appState = null;
  let activeScreen = 'resumo';
  let simResult = null;

  try {
    const saved = JSON.parse(localStorage.getItem('clareou-mobile-session') || 'null');
    if(saved && saved.profileId && saved.profileKey) session = saved;
  } catch {}

  function toast(msg){
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(()=>el.classList.remove('show'), 2200);
  }

  async function callApi(action, payload){
    if(!CONFIG.API_URL || CONFIG.API_URL.indexOf('COLE_AQUI') >= 0){
      throw new Error('Configure a API_URL no topo do arquivo antes de usar.');
    }
    const body = Object.assign({ action }, payload || {});
    const res = await fetch(CONFIG.API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // evita preflight de CORS
      body: JSON.stringify(body)
    });
    const data = await res.json().catch(()=>({ ok:false, error:'Resposta inválida do servidor' }));
    if(!data.ok) throw new Error(data.error || 'Falha na chamada');
    return data;
  }

  function money(n){ return (Number(n)||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'}); }
  function pct(n){ return (Number(n)||0).toLocaleString('pt-BR',{style:'percent',minimumFractionDigits:1,maximumFractionDigits:1}); }
  function monthLabel(m){ if(!m) return ''; const [y,mo]=m.split('-').map(Number); return new Date(y,mo-1,1).toLocaleDateString('pt-BR',{month:'short',year:'numeric'}).replace('.',''); }
  function byMonth(date, month){ return (date || '').slice(0,7) === month; }
  function escapeHtml(v){ return String(v||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  // ---------- Lógica pura reaproveitada do app completo (mesmos cálculos, sem duplicar regra de negócio) ----------
  function metric(state, month){
    const tx = state.transactions.filter(t=>byMonth(t.date, month));
    const income = tx.filter(t=>t.type==='Receita').reduce((s,t)=>s+Number(t.amount||0),0);
    const expenses = tx.filter(t=>t.type==='Despesa').reduce((s,t)=>s+Number(t.amount||0),0);
    const pending = tx.filter(t=>t.status!=='Pago').reduce((s,t)=>s+Number(t.amount||0),0);
    const operational = income - expenses;
    const savingRate = income ? operational / income : 0;
    const bal = state.balances.find(b=>b.month===month) || {};
    const netWorth = Number(bal.cash||0)+Number(bal.reserve||0)+Number(bal.investments||0)+Number(bal.assets||0)-Number(bal.debts||0);
    return { tx, income, expenses, pending, operational, savingRate, netWorth };
  }
  function openFinanceSnapshot(state){
    const conn = (state.bankConnections && state.bankConnections[0]) || {};
    const accounts = Array.isArray(conn.accounts) ? conn.accounts : [];
    const bankAccounts = accounts.filter(a=>String(a.type || '').toUpperCase() === 'BANK');
    const bankBalance = bankAccounts.filter(a=>a.hasBalance !== false).reduce((s,a)=>s+Number(a.balance||0),0);
    return { hasBalance: accounts.some(a=>a.hasBalance !== false && Number.isFinite(Number(a.balance))), bankBalance };
  }
  function previousMonth(month){ const [y,m]=month.split('-').map(Number); return new Date(y,m-2,1).toISOString().slice(0,7); }
  function ratioChange(current, base){ current=Number(current)||0; base=Number(base)||0; return base ? (current-base)/Math.abs(base) : 0; }
  function signedPct(value){ return (value>=0?'+':'')+(value*100).toFixed(0)+'%'; }
  function insight(kind,title,text,detail){ return {kind, title, text, detail}; }
  function insightKindLabel(kind){ return kind==='bad'?'olhar agora':kind==='warn'?'atenção':kind==='ok'?'ok':'entender'; }
  function expenseBreakdown(state, month){
    const map = new Map();
    state.transactions.filter(t=>byMonth(t.date,month)&&t.type==='Despesa').forEach(t=>map.set(t.category,(map.get(t.category)||0)+Number(t.amount||0)));
    return [...map.entries()].map(([category,amount])=>({category,amount})).sort((a,b)=>b.amount-a.amount);
  }
  function budgetRows(state, month){
    const categories = ['Salário','Freelance','Rendimentos','Moradia','Contas','Telefonia','Mercado','Alimentação','Transporte','Saúde','Educação','Lazer','Serviços','Impostos','Investimentos','Dívidas','Outros'];
    return categories.map(cat=>{
      const b = state.budgets.find(x=>x.month===month && x.category===cat) || {type: cat==='Salário'||cat==='Freelance'||cat==='Rendimentos'?'Receita':'Despesa', amount:0};
      const actual = state.transactions.filter(t=>byMonth(t.date,month) && t.category===cat && t.type===b.type).reduce((s,t)=>s+Number(t.amount||0),0);
      return {category:cat, type:b.type, planned:Number(b.amount||0), actual};
    }).filter(r=>r.planned || r.actual);
  }
  function alertsFor(state, month){
    const m = metric(state, month);
    const prev = metric(state, previousMonth(month));
    const expenseRows = expenseBreakdown(state, month);
    const rows = budgetRows(state, month);
    const out = [];
    if(m.income === 0) out.push(insight('info','Não entrou dinheiro neste mês','Sem receitas registradas neste mês.','Olhe se faltou lançar alguma entrada'));
    if(prev.expenses > 0){
      const delta = ratioChange(m.expenses, prev.expenses);
      if(Math.abs(delta) >= .15) out.push(insight(delta > 0 ? 'warn' : 'ok', 'Gastos '+(delta>0?'subiram':'caíram'), 'Compare com o mês passado.', signedPct(delta)+' em relação ao mês passado'));
    }
    if(m.income > 0){
      const expenseRatio = m.expenses / m.income;
      if(expenseRatio >= 1) out.push(insight('bad','Saiu mais dinheiro do que entrou','O mês fechou no negativo.', money(m.operational)+' de diferença'));
      else if(expenseRatio >= .85) out.push(insight('warn','Sobrou pouco espaço no mês','Quase todo o dinheiro que entrou foi usado.', pct(expenseRatio)+' do dinheiro foi usado'));
      const targetGap = m.operational - Number(state.settings.savingTargetAmount||0);
      if(Math.abs(targetGap) >= 100) out.push(insight(targetGap >= 0 ? 'ok' : 'warn','Sobra do mês contra a meta','Depois de pagar os gastos, isso sobrou.', (targetGap>=0?'+':'')+money(targetGap)+' contra a meta'));
    }
    if(expenseRows.length && m.expenses > 0){
      const top = expenseRows[0];
      const share = top.amount / m.expenses;
      if(share >= .35) out.push(insight('info','Olhe para '+top.category,'Essa categoria puxou uma parte grande dos gastos.', pct(share)+' dos gastos'));
    }
    rows.filter(r=>r.type==='Despesa' && r.planned>0).forEach(r=>{
      const diff = r.actual - r.planned;
      if(Math.abs(diff) >= Math.max(100, r.planned * .1)) out.push(insight(diff > 0 ? 'warn' : 'ok', r.category+' saiu do combinado', 'Valor real diferente do planejado.', (diff>=0?'+':'')+money(diff)));
    });
    if(m.pending>0) out.push(insight('warn','Ainda tem valor em aberto','Existem lançamentos pendentes.', money(m.pending)+' em aberto'));
    return out.slice(0, 8);
  }
  function topAlert(al){
    const order = {bad:0, warn:1, info:2, ok:3};
    return al.slice().sort((a,b)=>(order[a.kind]??9)-(order[b.kind]??9))[0] || insight('ok','Nada chamou muita atenção','Os números deste período estão parecidos com o padrão recente.','Sem grande mudança');
  }

  // ---------- Simulador: mesmas funções puras do app completo ----------
  function localIsoDate(date){ date = date || new Date(); return date.getFullYear()+'-'+String(date.getMonth()+1).padStart(2,'0')+'-'+String(date.getDate()).padStart(2,'0'); }
  function parseIsoDate(value){ const parts=String(value||'').slice(0,10).split('-').map(Number); return parts.length===3 && parts.every(Number.isFinite) ? new Date(parts[0],parts[1]-1,parts[2],12,0,0,0) : new Date(); }
  function addDaysIso(value, days){ const d=parseIsoDate(value); d.setDate(d.getDate()+Number(days||0)); return localIsoDate(d); }
  function addMonthsIso(value, months){ const d=parseIsoDate(value), day=d.getDate(); d.setDate(1); d.setMonth(d.getMonth()+Number(months||0)); d.setDate(Math.min(day,new Date(d.getFullYear(),d.getMonth()+1,0).getDate())); return localIsoDate(d); }
  function shortDate(value){ return parseIsoDate(value).toLocaleDateString('pt-BR',{day:'2-digit',month:'short'}).replace('.',''); }
  function internalTransfer(item){ const marker=[item.transferType,item.notes,item.category].join(' ').toLowerCase(); return marker.includes('interna') || marker.includes('interno'); }
  function commitmentEvents(commitment,startDate,endDate){
    if(!commitment || commitment.active===false || !commitment.dueDate) return [];
    const frequency=commitment.frequency==='monthly'?'monthly':'once';
    const endLimit=commitment.endDate && commitment.endDate<endDate ? commitment.endDate : endDate;
    let date=String(commitment.dueDate).slice(0,10), guard=0;
    if(frequency==='monthly') while(date<startDate && guard++<120) date=addMonthsIso(date,1);
    if(frequency==='once' && date<startDate) return [];
    const out=[];
    while(date<=endLimit && guard++<180){
      if(date>=startDate) out.push({ date, description:commitment.description||'Compromisso', delta:commitment.type==='Receita'?Math.abs(Number(commitment.amount||0)):-Math.abs(Number(commitment.amount||0)), certainty:commitment.certainty||'Previsto' });
      if(frequency!=='monthly') break;
      date=addMonthsIso(date,1);
    }
    return out;
  }
  function scenarioEvents(scenario,startDate,endDate){
    if(!scenario || !Number(scenario.amount) || !scenario.cashDate) return [];
    const installments=Math.max(1,Math.min(48,Number(scenario.installments||1)));
    const totalCents=Math.round(Math.abs(Number(scenario.amount))*100);
    const baseCents=Math.floor(totalCents/installments);
    let assigned=0; const out=[];
    for(let i=0;i<installments;i++){
      const cents=i===installments-1?totalCents-assigned:baseCents; assigned+=cents;
      const date=i===0?scenario.cashDate:addMonthsIso(scenario.cashDate,i);
      if(date<startDate || date>endDate) continue;
      const amount=cents/100, positive=scenario.kind==='Entrada';
      out.push({ date, description:scenario.description||'Decisão simulada', delta:positive?amount:-amount, certainty:'Simulado' });
    }
    return out;
  }
  function simulatorEvents(state, startDate,endDate,scenario){
    const events=[];
    (state.transactions||[]).forEach(t=>{
      const date=String(t.date||'').slice(0,10);
      if(!date || date<startDate || date>endDate || t.skip || internalTransfer(t)) return;
      if(date>=startDate && t.status==='Pago') return;
      const amount=Math.abs(Number(t.amount||0)); if(!amount) return;
      events.push({ date, description:t.description||t.category||'Lançamento', delta:t.type==='Receita'?amount:-amount, certainty:t.status==='Planejado'?'Previsto':'Confirmado' });
    });
    (state.commitments||[]).forEach(c=>events.push(...commitmentEvents(c,startDate,endDate)));
    events.push(...scenarioEvents(scenario,startDate,endDate));
    return events.sort((a,b)=>a.date.localeCompare(b.date));
  }
  function runCashFlow(state, options,scenario){
    options=options||{};
    const startDate=options.startDate||localIsoDate();
    const horizon=Math.max(7,Math.min(180,Number(options.horizon||60)));
    const endDate=addDaysIso(startDate,horizon);
    const startingBalance=Number(options.startingBalance||0);
    const buffer=Math.max(0,Number(options.buffer||0));
    const events=simulatorEvents(state, startDate,endDate,scenario);
    const byDate=new Map();
    events.forEach(e=>{ const list=byDate.get(e.date)||[]; list.push(e); byDate.set(e.date,list); });
    const points=[]; let balance=startingBalance;
    for(let i=0;i<=horizon;i++){
      const date=addDaysIso(startDate,i), dayEvents=byDate.get(date)||[];
      balance+=dayEvents.reduce((sum,e)=>sum+Number(e.delta||0),0);
      points.push({date,balance,free:balance-buffer});
    }
    const lowestFree=points.reduce((a,b)=>b.free<a.free?b:a,points[0]);
    const lowest=points.reduce((a,b)=>b.balance<a.balance?b:a,points[0]);
    return { startDate,endDate,horizon,startingBalance,buffer,events,
      finalBalance:points[points.length-1].balance, minBalance:lowest.balance, minBalanceDate:lowest.date,
      minFree:lowestFree.free, minFreeDate:lowestFree.date };
  }
  function cashflowTone(result){ return result.minBalance<0?'bad':result.minFree<0?'warn':'ok'; }

  // ---------- Navegação ----------
  function showScreen(name){
    activeScreen = name;
    document.querySelectorAll('.screen').forEach(s=>s.classList.toggle('active', s.id === 'screen-'+name));
    document.querySelectorAll('.bottom-nav button').forEach(b=>b.classList.toggle('active', b.dataset.screen === name));
    if(name==='resumo') renderResumo();
    if(name==='rapido') renderRapido();
    if(name==='simulador') renderSimulador();
  }
  document.querySelectorAll('.bottom-nav button').forEach(b=>b.onclick=()=>showScreen(b.dataset.screen));

  // ---------- Tela: Resumo ----------
  function renderResumo(){
    const el = document.getElementById('screen-resumo');
    if(!appState){ el.innerHTML = '<div style="padding:40px;text-align:center;color:var(--sub)">Carregando...</div>'; return; }
    const month = appState.settings.month;
    const m = metric(appState, month);
    const of = openFinanceSnapshot(appState);
    const al = alertsFor(appState, month);
    const top = topAlert(al);
    const metaOk = m.operational >= Number(appState.settings.savingTargetAmount||0);
    const heroValue = of.hasBalance ? money(of.bankBalance) : money(m.operational);
    const heroEyebrow = of.hasBalance ? 'Saldo conectado \u00b7 '+monthLabel(month) : monthLabel(month);
    const heroLabel = of.hasBalance ? 'Atualizado via Open Finance' : 'Sobra confirmada do m\u00eas';
    el.innerHTML =
      '<div class="hero-card">'+
        '<div class="h-eyebrow">'+escapeHtml(heroEyebrow)+'</div>'+
        '<div class="h-value">'+heroValue+'</div>'+
        '<div class="h-label">'+escapeHtml(heroLabel)+'</div>'+
        '<div class="h-chips">'+
          '<div class="h-chip"><span>Sobra do m\u00eas</span><strong>'+money(m.operational)+'</strong></div>'+
          '<div class="h-chip"><span>Pend\u00eancias</span><strong>'+money(m.pending)+'</strong></div>'+
        '</div>'+
      '</div>'+
      '<div class="content">'+
        '<div class="kpi-row">'+
          '<div class="kpi-card '+(metaOk?'ok':'warn')+'"><span>Meta de sobra</span><strong>'+money(Number(appState.settings.savingTargetAmount||0))+'</strong></div>'+
          '<div class="kpi-card '+(m.pending>0?'warn':'ok')+'"><span>Em aberto</span><strong>'+money(m.pending)+'</strong></div>'+
        '</div>'+
        '<div class="card">'+
          '<div class="card-head"><h3>Onde olhar agora</h3><span class="pill '+top.kind+'">'+insightKindLabel(top.kind)+'</span></div>'+
          '<div class="insight '+top.kind+'">'+
            '<div class="i-head"><div class="i-title">'+escapeHtml(top.title)+'</div></div>'+
            '<div class="i-text">'+escapeHtml(top.text)+'</div>'+
            '<div class="i-detail">'+escapeHtml(top.detail||'')+'</div>'+
          '</div>'+
          (al.length>1?'<p class="hint" style="text-align:center">+'+(al.length-1)+' ponto(s) \u00b7 an\u00e1lise completa no computador</p>':'')+
        '</div>'+
        '<div class="btn-row">'+
          '<button class="btn primary" onclick="window.__clareouGo(\'rapido\')">Lan\u00e7ar r\u00e1pido</button>'+
          '<button class="btn ghost" onclick="window.__clareouGo(\'simulador\')">Simular</button>'+
        '</div>'+
      '</div>';
  }
  window.__clareouGo = showScreen;

  // ---------- Tela: Lançamento rápido ----------
  function renderRapido(){
    const el = document.getElementById('screen-rapido');
    const today = new Date().toISOString().slice(0,10);
    el.innerHTML =
      '<div class="hero-card" style="border-radius:0 0 20px 20px;padding:20px 24px 24px">'+
        '<div class="h-eyebrow">Lan\u00e7amento r\u00e1pido</div>'+
        '<div class="h-value" style="font-size:28px">Novo registro</div>'+
      '</div>'+
      '<div class="content">'+
      '<div class="card">'+
      '<form id="quickForm" style="display:flex;flex-direction:column;gap:16px">'+
        '<div class="type-row">'+
          '<label><input type="radio" name="kind" value="Receita"><span>Receita</span></label>'+
          '<label><input type="radio" name="kind" value="Despesa" checked><span>Despesa</span></label>'+
          '<label><input type="radio" name="kind" value="Investimento"><span>Investim.</span></label>'+
        '</div>'+
        '<div class="field"><label>Valor</label><input type="number" name="amount" min="0" step="0.01" inputmode="decimal" placeholder="0,00" required style="font-size:28px;font-weight:800;letter-spacing:-1px;min-height:62px"></div>'+
        '<div class="field"><label>Data</label><input type="date" name="date" value="'+today+'" required></div>'+
        '<div class="field"><label>Categoria ou ticker</label><input name="category" placeholder="Mercado, Sal\u00e1rio, IVVB11..." required></div>'+
        '<div class="field"><label>Descri\u00e7\u00e3o (opcional)</label><input name="description" placeholder="Ex: mercado da semana"></div>'+
        '<button class="btn primary">Salvar lan\u00e7amento</button>'+
      '</form>'+
      '</div></div>';
    document.getElementById('quickForm').onsubmit = async e=>{
      e.preventDefault();
      const f = new FormData(e.target);
      const payload = {
        profileId: session.profileId, profileKey: session.profileKey,
        kind: f.get('kind'), amount: Number(f.get('amount')||0), date: f.get('date'),
        category: String(f.get('category')||'').trim(), description: String(f.get('description')||'').trim(),
        account: 'Conta Corrente', status: 'Pago'
      };
      if(!payload.amount || !payload.category){ toast('Preencha valor e categoria'); return; }
      try{
        const result = await callApi('quickAdd', payload);
        appState = result.state;
        toast('Salvo!');
        e.target.reset();
        showScreen('resumo');
      }catch(err){ toast(err.message || 'Não foi possível salvar'); }
    };
  }

  // ---------- Tela: Simulador ----------
  function renderSimulador(){
    const el = document.getElementById('screen-simulador');
    const of = appState ? openFinanceSnapshot(appState) : {hasBalance:false};
    const startingBalance = of.hasBalance ? of.bankBalance : 0;
    const buffer = appState ? Number(appState.settings.bufferTargetAmount||0) : 0;
    el.innerHTML =
      '<div class="hero-card" style="border-radius:0 0 20px 20px;padding:20px 24px 24px">'+
        '<div class="h-eyebrow">Simulador de decis\u00e3o</div>'+
        '<div class="h-value" style="font-size:28px">Veja o impacto antes</div>'+
      '</div>'+
      '<div class="content">'+
      '<div class="card">'+
      '<form id="simForm" style="display:flex;flex-direction:column;gap:16px">'+
        '<div class="btn-row">'+
          '<div class="field"><label>Saldo inicial</label><input type="number" name="startingBalance" step="0.01" value="'+startingBalance+'" required></div>'+
          '<div class="field"><label>Conta respiro</label><input type="number" name="buffer" step="0.01" value="'+buffer+'" required></div>'+
        '</div>'+
        '<div class="type-row" style="grid-template-columns:1fr 1fr">'+
          '<label><input type="radio" name="kind" value="Sa\u00edda" checked><span>Sa\u00edda</span></label>'+
          '<label><input type="radio" name="kind" value="Entrada"><span>Entrada</span></label>'+
        '</div>'+
        '<div class="field"><label>Descri\u00e7\u00e3o</label><input name="description" placeholder="Ex: compra de m\u00f3veis" required></div>'+
        '<div class="field"><label>Valor</label><input type="number" name="amount" min="0.01" step="0.01" required placeholder="0,00" style="font-size:24px;font-weight:800;min-height:58px"></div>'+
        '<div class="btn-row">'+
          '<div class="field"><label>Data</label><input type="date" name="cashDate" value="'+localIsoDate()+'" required></div>'+
          '<div class="field"><label>Per\u00edodo</label><select name="horizon"><option value="30">30 dias</option><option value="60" selected>60 dias</option><option value="90">90 dias</option></select></div>'+
        '</div>'+
        '<button class="btn primary">Ver o impacto</button>'+
      '</form>'+
      '</div>'+
      '<div id="simResultBox"></div>'+
      '<p class="hint" style="text-align:center">Vers\u00e3o simplificada. Simula\u00e7\u00f5es completas dispon\u00edveis no computador.</p>'+
      '</div>';
    document.getElementById('simForm').onsubmit = e=>{
      e.preventDefault();
      const f = new FormData(e.target);
      const input = {
        startDate: localIsoDate(), horizon: Number(f.get('horizon')||60),
        startingBalance: Number(f.get('startingBalance')||0), buffer: Number(f.get('buffer')||0),
        scenario: { kind: f.get('kind'), description: String(f.get('description')||'').trim(), amount: Number(f.get('amount')||0), cashDate: f.get('cashDate'), installments: 1 }
      };
      if(!input.scenario.description || input.scenario.amount<=0){ toast('Informe a decisão e o valor'); return; }
      const baseline = runCashFlow(appState, input, null);
      const result = runCashFlow(appState, input, input.scenario);
      const tone = cashflowTone(result);
      const impact = result.minFree - baseline.minFree;
      document.getElementById('simResultBox').innerHTML =
        '<div class="result-banner '+tone+'">'+
          '<h4>'+(tone==='bad'?'\u26a0 Saldo ficaria negativo':tone==='warn'?'Conta respiro seria usada':'Respiro preservado \u2713')+'</h4>'+
          '<p>Menor dinheiro livre em '+shortDate(result.minFreeDate)+'</p>'+
          '<div class="compare-row">'+
            '<div class="compare-box"><span>Sem a decis\u00e3o</span><strong>'+money(baseline.minFree)+'</strong></div>'+
            '<div class="compare-box"><span>Com a decis\u00e3o</span><strong class="'+(impact<0?'money-neg':'money-pos')+'">'+money(result.minFree)+'</strong></div>'+
          '</div>'+
        '</div>';
    };
  }

  // ---------- Login / carregamento ----------
  async function loadStateAndEnter(){
    try{
      const result = await callApi('getState', { profileId: session.profileId, profileKey: session.profileKey });
      appState = result.state;
      localStorage.setItem('clareou-mobile-session', JSON.stringify(session));
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      document.getElementById('topbarSub').textContent = appState.profile.name || appState.profile.id || '';
      showScreen('resumo');
    }catch(err){
      toast(err.message || 'Não foi possível entrar. Confira código e chave.');
    }
  }
  document.getElementById('loginBtn').onclick = () => {
    session.profileId = document.getElementById('loginProfileId').value.trim().toUpperCase();
    session.profileKey = document.getElementById('loginProfileKey').value.trim();
    if(!session.profileId || !session.profileKey){ toast('Informe código e chave'); return; }
    loadStateAndEnter();
  };

  if(session.profileId && session.profileKey){
    document.getElementById('loginProfileId').value = session.profileId;
    loadStateAndEnter();
  }

  // ---------- Instalar na tela inicial ----------
  function isStandalone(){ return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true; }
  function maybeShowInstallBanner(){
    if(isStandalone()) return;
    try{ if(localStorage.getItem('clareou-mobile-install-dismissed')) return; }catch{ return; }
    const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent || '');
    document.getElementById('installBannerText').textContent = isIOS
      ? 'Dica: toque em Compartilhar e depois em "Adicionar à Tela de Início" para instalar o Clareou.'
      : 'Dica: abra o menu (⋮) e toque em "Adicionar à tela inicial" para instalar o Clareou.';
    document.getElementById('installBanner').style.display = 'block';
  }
  document.getElementById('installBannerClose').onclick = () => {
    document.getElementById('installBanner').style.display = 'none';
    try{ localStorage.setItem('clareou-mobile-install-dismissed', '1'); }catch{}
  };
  setTimeout(maybeShowInstallBanner, 1200);
})();
</script>
</body>
</html>
